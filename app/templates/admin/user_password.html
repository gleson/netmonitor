{% extends "base.html" %}
{% block title %}Alterar Senha — {{ user.username }} - NetMonitor{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="bi bi-key"></i> Alterar Senha — <strong>{{ user.username }}</strong></h2>
    <a href="{{ url_for('admin.user_list') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<div class="row">
    <div class="col-md-5">
        <div class="card bg-dark border-secondary">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label">Nova senha</label>
                        <input type="password" name="password" class="form-control bg-dark text-light border-secondary"
                               required autofocus autocomplete="new-password">
                        <div class="form-text text-muted">Mínimo 10 caracteres, com letras e números.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar senha</label>
                        <input type="password" name="confirm_password" class="form-control bg-dark text-light border-secondary"
                               required autocomplete="new-password">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-key"></i> Alterar Senha
                        </button>
                        <a href="{{ url_for('admin.user_list') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
